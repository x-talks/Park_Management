<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Park Management — Login</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div id="login-logo-wrap" style="text-align:center;margin-bottom:1rem">
      <img src="logo.png" alt="Logo" id="login-logo"
           style="max-height:64px;max-width:100%;object-fit:contain"
           onerror="this.style.display='none'"/>
    </div>
    <h1>Park Management</h1>
    <p class="subtitle">Sign in to your account</p>
    <form id="login-form">
      <div class="form-group">
        <label for="username">License Plate / Username</label>
        <input id="username" type="text" autocomplete="username" placeholder="e.g. HD-XY-123" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required/>
      </div>
      <button type="submit" style="width:100%">Sign In</button>
      <div id="error" class="alert error" style="display:none"></div>
    </form>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
if (getSession()) location.href = 'parking.html';

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const user = await login(
      document.getElementById('username').value.trim(),
      document.getElementById('password').value
    );
    location.href = (user.role === 'admin' || user.role === 'master') ? 'admin.html' : 'parking.html';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'flex';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
