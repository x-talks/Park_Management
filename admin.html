<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Park Management — Admin</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
  .badge {
    display: inline-block;
    background: #000;
    color: #fff;
    border-radius: 999px;
    font-size: 0.7rem;
    padding: 0.1rem 0.45rem;
    margin-left: 0.3rem;
    vertical-align: middle;
  }
  .pending-row { background: #f5f5f5; }
  .diff-block { font-size: 0.8rem; margin: 0.4rem 0; }
  .diff-old { color: #999; text-decoration: line-through; }
  .diff-new { color: #000; font-weight: bold; }
  .invite-link-box {
    border: 1px solid #000;
    padding: 0.75rem;
    margin-top: 0.75rem;
    word-break: break-all;
    font-size: 0.8rem;
  }
  .wa-btn {
    display: inline-block;
    margin-top: 0.5rem;
    background: #25D366;
    color: #fff;
    border: none;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    font-family: monospace;
    font-size: 0.85rem;
    text-decoration: none;
  }
  .reset-form { display: none; margin-top: 0.5rem; }
  .plaintext-pw {
    border: 1px solid #000;
    padding: 0.4rem 0.6rem;
    font-family: monospace;
    font-size: 1rem;
    letter-spacing: 0.05em;
    margin: 0.5rem 0;
    background: #fffbe6;
  }
</style>
</head>
<body>
<h1>Admin Dashboard</h1>
<nav>
  <a href="parking.html">Map</a>
  <a href="admin.html">Admin</a>
  <a href="#" onclick="logout()">Logout</a>
</nav>

<nav style="margin-bottom:2rem">
  <a href="#" onclick="showTab('users')">Users <span id="pending-badge" class="badge" style="display:none">0</span></a>
  <a href="#" onclick="showTab('spots')">Spots</a>
  <a href="#" onclick="showTab('payments')">Payments</a>
</nav>

<!-- ── Users tab ──────────────────────────────────────────────────────────── -->
<div id="tab-users" class="tab">
  <h2>Users</h2>
  <div id="user-list"></div>

  <h3>Create User &amp; Generate Invite</h3>
  <form id="create-user-form">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 1rem">
      <div class="form-group"><label>First Name *</label><input id="cu-name" required/></div>
      <div class="form-group"><label>Last Name *</label><input id="cu-lastname" required/></div>
      <div class="form-group"><label>Phone / WhatsApp *</label><input id="cu-phone" required/></div>
      <div class="form-group"><label>Address *</label><input id="cu-address" required/></div>
    </div>
    <div class="form-group">
      <label>Parking Spot * <small>(free spots only)</small></label>
      <select id="cu-spot" required><option value="">— select —</option></select>
    </div>
    <p style="font-size:0.8rem;margin:0.5rem 0 0.25rem"><strong>Car details</strong> — optional here; user must complete them during registration.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 1rem">
      <div class="form-group"><label>License Plate</label><input id="cu-plate" placeholder="HD-XY-123"/></div>
      <div class="form-group"><label>Car Model</label><input id="cu-carmodel" placeholder="VW Golf"/></div>
      <div class="form-group"><label>Car Color</label><input id="cu-carcolor" placeholder="blue"/></div>
    </div>
    <button type="submit">Create &amp; Generate Invite Link</button>
    <div id="cu-msg"></div>
  </form>
  <div id="invite-result-box" style="display:none" class="invite-link-box">
    <strong>Invite link (valid 7 days):</strong><br>
    <span id="invite-url-text"></span><br>
    <a id="invite-wa-link" class="wa-btn" target="_blank">Send via WhatsApp</a>
  </div>
</div>

<!-- ── Spots tab ──────────────────────────────────────────────────────────── -->
<div id="tab-spots" class="tab" style="display:none">
  <h2>Spot Assignments</h2>
  <div id="spot-list"></div>
</div>

<!-- ── Payments tab ───────────────────────────────────────────────────────── -->
<div id="tab-payments" class="tab" style="display:none">
  <h2>Payment Overview</h2>
  <div style="overflow-x:auto"><div id="payment-matrix"></div></div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script>
const currentUser = requireAuth('admin');

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
  document.getElementById('tab-' + name).style.display = 'block';
  if (name === 'users')    { renderUsers(); loadFreeSpots(); }
  if (name === 'spots')    renderSpots();
  if (name === 'payments') renderPayments();
}
showTab('users');

// ── DOM helpers ───────────────────────────────────────────────────────────────
function el(tag, props, ...children) {
  props = props || {};
  const node = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'className') node.className = v;
    else if (k === 'textContent') node.textContent = v;
    else if (k.startsWith('on')) node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  });
  children.forEach(c => node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return node;
}
function td(text) { return el('td', { textContent: text }); }
function th(text) { return el('th', { textContent: text }); }

// ── Users tab ─────────────────────────────────────────────────────────────────
async function renderUsers() {
  const users = await loadUsers();

  // Pending edits badge
  const pending = users.filter(u => u.pendingEdits);
  const badge = document.getElementById('pending-badge');
  if (pending.length > 0) {
    badge.textContent = pending.length;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }

  const container = document.getElementById('user-list');
  while (container.firstChild) container.removeChild(container.firstChild);

  const table = el('table');
  const headRow = el('tr');
  ['License Plate','Name','Phone','Spot','Car','Active','Actions'].forEach(h => headRow.appendChild(th(h)));
  table.appendChild(headRow);

  const spots = await readFile('data/spots.json');

  users.forEach(u => {
    const assignedSpot = spots.find(s => s.assignedUserId === u.id);
    const row = el('tr');
    if (u.pendingEdits) row.className = 'pending-row';

    row.appendChild(td(u.licensePlate || u.username));
    row.appendChild(td(`${u.name || ''} ${u.lastName || ''}`.trim()));
    row.appendChild(td(u.phone || '—'));
    row.appendChild(td(assignedSpot ? assignedSpot.label : '—'));
    row.appendChild(td(u.carModel ? `${u.carModel} (${u.carColor || '?'})` : '—'));
    row.appendChild(td(u.active ? 'Yes' : 'No'));

    const actionCell = el('td');

    if (u.role !== 'master') {
      // Toggle active
      actionCell.appendChild(el('button', {
        className: 'secondary',
        textContent: u.active ? 'Deactivate' : 'Activate',
        onclick: async () => { await toggleUserActive(u.id); renderUsers(); }
      }));
      actionCell.appendChild(document.createTextNode(' '));

      // Reset password
      const resetWrap = document.createElement('span');
      const resetBtn = el('button', { className: 'secondary', textContent: 'Reset PW' });
      const resetForm = document.createElement('div');
      resetForm.className = 'reset-form';
      const pwInput = el('input', { type: 'text', placeholder: 'new password' });
      pwInput.style.cssText = 'width:auto;display:inline;margin-right:4px';
      const confirmBtn = el('button', { textContent: 'Set' });
      const pwDisplay = document.createElement('div');
      resetForm.appendChild(pwInput);
      resetForm.appendChild(confirmBtn);
      resetForm.appendChild(pwDisplay);
      resetBtn.addEventListener('click', () => {
        resetForm.style.display = resetForm.style.display === 'none' ? 'block' : 'none';
        pwDisplay.textContent = '';
      });
      confirmBtn.addEventListener('click', async () => {
        const pw = pwInput.value.trim();
        if (!pw) return;
        try {
          await resetPassword(u.id, pw, currentUser.role);
          pwDisplay.innerHTML = '';
          pwDisplay.appendChild(el('div', { className: 'plaintext-pw', textContent: `New password: ${pw}` }));
          pwDisplay.appendChild(el('small', { textContent: 'Copy and share this password. It will not be shown again.' }));
          pwInput.value = '';
        } catch(err) { pwDisplay.textContent = err.message; }
      });
      resetWrap.appendChild(resetBtn);
      resetWrap.appendChild(resetForm);
      actionCell.appendChild(resetWrap);
      actionCell.appendChild(document.createTextNode(' '));
    }

    // Role toggle (master only)
    if (currentUser.role === 'master' && u.role !== 'master') {
      const newRole = u.role === 'admin' ? 'renter' : 'admin';
      actionCell.appendChild(el('button', {
        className: 'secondary',
        textContent: `Make ${newRole.charAt(0).toUpperCase() + newRole.slice(1)}`,
        onclick: async () => { await setUserRole(u.id, newRole, currentUser.role); renderUsers(); }
      }));
      actionCell.appendChild(document.createTextNode(' '));
    }

    // Pending edits
    if (u.pendingEdits) {
      const reviewWrap = document.createElement('div');
      reviewWrap.style.marginTop = '0.25rem';
      const { requestedAt, ...changes } = u.pendingEdits;
      const diffDiv = document.createElement('div');
      diffDiv.className = 'diff-block';
      diffDiv.appendChild(el('strong', { textContent: 'Requested changes:' }));
      Object.entries(changes).forEach(([field, newVal]) => {
        const line = document.createElement('div');
        line.appendChild(el('span', { className: 'diff-old', textContent: `${field}: ${u[field] || '—'}` }));
        line.appendChild(document.createTextNode(' → '));
        line.appendChild(el('span', { className: 'diff-new', textContent: String(newVal) }));
        diffDiv.appendChild(line);
      });
      const approveBtn = el('button', {
        textContent: 'Approve',
        onclick: async () => { await approvePendingEdit(u.id); renderUsers(); }
      });
      const rejectBtn = el('button', {
        className: 'secondary',
        textContent: 'Reject',
        onclick: async () => { await rejectPendingEdit(u.id); renderUsers(); }
      });
      reviewWrap.appendChild(diffDiv);
      reviewWrap.appendChild(approveBtn);
      reviewWrap.appendChild(document.createTextNode(' '));
      reviewWrap.appendChild(rejectBtn);
      actionCell.appendChild(reviewWrap);
    }

    row.appendChild(actionCell);
    table.appendChild(row);
  });
  container.appendChild(table);
}

// ── Create user + invite ───────────────────────────────────────────────────────
async function loadFreeSpots() {
  const spots = await readFile('data/spots.json');
  const sel = document.getElementById('cu-spot');
  while (sel.firstChild) sel.removeChild(sel.firstChild);
  sel.appendChild(el('option', { value: '' }, '— select —'));
  spots.filter(s => !s.assignedUserId).forEach(s => {
    sel.appendChild(el('option', { value: s.id }, `Spot ${s.label}`));
  });
}

document.getElementById('create-user-form').addEventListener('submit', async e => {
  e.preventDefault();
  const msg = document.getElementById('cu-msg');
  msg.textContent = '';
  const resultBox = document.getElementById('invite-result-box');
  resultBox.style.display = 'none';
  try {
    const url = await createAndInviteUser({
      name:         document.getElementById('cu-name').value.trim(),
      lastName:     document.getElementById('cu-lastname').value.trim(),
      phone:        document.getElementById('cu-phone').value.trim(),
      address:      document.getElementById('cu-address').value.trim(),
      spotId:       document.getElementById('cu-spot').value,
      licensePlate: document.getElementById('cu-plate').value.trim() || null,
      carModel:     document.getElementById('cu-carmodel').value.trim() || null,
      carColor:     document.getElementById('cu-carcolor').value.trim() || null,
    });

    document.getElementById('invite-url-text').textContent = url;
    const name = document.getElementById('cu-name').value.trim();
    const waText = encodeURIComponent(
      `Hallo ${name},\n\nHier ist dein Einladungslink zur Parkplatzverwaltung:\n${url}\n\nBitte registriere dich innerhalb von 7 Tagen.`
    );
    document.getElementById('invite-wa-link').href = `https://wa.me/?text=${waText}`;
    resultBox.style.display = 'block';

    msg.className = 'success';
    msg.textContent = 'Invite created successfully.';
    e.target.reset();
    loadFreeSpots();
    renderUsers();
  } catch(err) {
    msg.className = 'error';
    msg.textContent = err.message;
  }
});

// ── Spots tab ─────────────────────────────────────────────────────────────────
async function renderSpots() {
  const [spots, users] = await Promise.all([readFile('data/spots.json'), loadUsers()]);
  const container = document.getElementById('spot-list');
  while (container.firstChild) container.removeChild(container.firstChild);

  const table = el('table');
  const headRow = el('tr');
  ['Spot','State','Assigned To','License Plate','Actions'].forEach(h => headRow.appendChild(th(h)));
  table.appendChild(headRow);

  spots.forEach(s => {
    const renter = users.find(u => u.id === s.assignedUserId);
    const row = el('tr');
    row.appendChild(td(s.label));
    row.appendChild(td(s.state));
    row.appendChild(td(renter ? `${renter.name || ''} ${renter.lastName || ''}`.trim() : '—'));
    row.appendChild(td(renter ? (renter.licensePlate || renter.username) : '—'));

    const actionCell = el('td');
    if (s.assignedUserId) {
      actionCell.appendChild(el('button', {
        className: 'secondary',
        textContent: 'Unassign',
        onclick: async () => { await unassignSpot(s.id); renderSpots(); }
      }));
    } else {
      const select = el('select');
      select.setAttribute('id', `assign-user-${s.id}`);
      select.appendChild(el('option', { value: '' }, '-- user --'));
      users.filter(u => u.active && u.role === 'renter').forEach(u => {
        select.appendChild(el('option', { value: u.id }, `${u.name} (${u.licensePlate || u.username})`));
      });
      actionCell.appendChild(select);
      actionCell.appendChild(document.createTextNode(' '));
      actionCell.appendChild(el('button', {
        className: 'secondary',
        textContent: 'Assign',
        onclick: async () => {
          const sel = document.getElementById(`assign-user-${s.id}`);
          if (sel && sel.value) { await assignSpot(s.id, sel.value); renderSpots(); }
        }
      }));
    }
    row.appendChild(actionCell);
    table.appendChild(row);
  });
  container.appendChild(table);
}

// ── Payments tab ──────────────────────────────────────────────────────────────
async function renderPayments() {
  const { payments, spots } = await getPaymentMatrix();
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ month: d.getMonth() + 1, year: d.getFullYear() });
  }

  const container = document.getElementById('payment-matrix');
  while (container.firstChild) container.removeChild(container.firstChild);

  const table = el('table');
  const headRow = el('tr');
  headRow.appendChild(th('Spot'));
  months.forEach(m => headRow.appendChild(th(`${m.year}-${String(m.month).padStart(2,'0')}`)));
  table.appendChild(headRow);

  spots.forEach(s => {
    const row = el('tr');
    row.appendChild(td(s.label));
    months.forEach(m => {
      const p = payments.find(x => x.spotId === s.id && x.month === m.month && x.year === m.year);
      const cell = el('td');
      if (p) {
        cell.textContent = `Paid ${p.paidDate}`;
      } else if (!s.assignedUserId) {
        cell.textContent = '—';
      } else {
        cell.appendChild(el('button', {
          className: 'secondary',
          textContent: 'Mark',
          onclick: async () => {
            await markPaid(s.id, s.assignedUserId, m.month, m.year, currentUser.id);
            renderPayments();
          }
        }));
      }
      row.appendChild(cell);
    });
    table.appendChild(row);
  });
  container.appendChild(table);
}
</script>
</body>
</html>
