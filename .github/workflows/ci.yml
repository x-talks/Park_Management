name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      STAGING_SUPABASE_URL:         ${{ secrets.STAGING_SUPABASE_URL }}
      STAGING_SUPABASE_ANON_KEY:    ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      STAGING_SUPABASE_SERVICE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}
      STAGING_WORKER_URL:           ${{ secrets.STAGING_WORKER_URL }}
      STAGING_ADMIN_PASSWORD:       ${{ secrets.STAGING_ADMIN_PASSWORD }}
      STAGING_MASTER_PASSWORD:      ${{ secrets.STAGING_MASTER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dump production schema and apply to staging
        env:
          PROD_DB_URL: postgresql://postgres:${{ secrets.PROD_SUPABASE_DB_PASSWORD }}@db.fnluagvzowbcuzlblfmr.supabase.co:5432/postgres
          STAGING_DB_URL: postgresql://postgres:${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}@db.yuoqbjopaemikxiwvtup.supabase.co:5432/postgres
        run: |
          pg_dump "$PROD_DB_URL" --schema public --schema-only -f /tmp/schema.sql
          psql "$STAGING_DB_URL" -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          psql "$STAGING_DB_URL" -f /tmp/schema.sql

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
