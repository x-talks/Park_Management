<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Park Management</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<header class="site-header">
  <h1>Park Management</h1>
  <nav class="site-nav">
    <a href="parking.html" class="active">Map</a>
    <span id="admin-link" style="display:none"><a href="admin.html">Admin</a></span>
    <a href="#" id="logout-link">Logout</a>
  </nav>
</header>

<div class="page-wrap">

  <!-- Map card -->
  <div class="card" style="padding:1rem">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap">
      <span style="font-size:0.8rem;color:var(--gray-600)">📍 Kaiser-Wilhelm-Straße 63, 67059 Ludwigshafen</span>
      <a href="https://maps.google.com/?q=Kaiser-Wilhelm-Stra%C3%9Fe+63,+67059+Ludwigshafen"
         target="_blank" rel="noopener"
         class="maps-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Open in Maps
      </a>
    </div>
    <div style="overflow-x:auto">
      <svg id="parking-svg" viewBox="-60 0 920 760"
           style="width:100%;max-width:980px;height:auto;display:block">
      </svg>
    </div>

    <!-- Legend -->
    <div class="map-legend">
      <span style="font-size:0.75rem;color:var(--gray-600);font-weight:700;text-transform:uppercase;letter-spacing:.04em">Legend:</span>
      <span class="legend-item"><span class="legend-swatch free"></span> Free</span>
      <span class="legend-item"><span class="legend-swatch occupied"></span> Occupied</span>
      <span class="legend-item"><span class="legend-swatch reserved"></span> Reserved (external)</span>
      <span class="legend-item"><span class="legend-swatch mine"></span> Your spot</span>
    </div>

    <!-- Info panel -->
    <div id="info-panel">Click a spot to see details.</div>
  </div>

  <!-- My Spots & Payments -->
  <div id="my-payments-section"></div>

  <!-- Residents -->
  <div class="card" style="padding:0.75rem 1.25rem">
    <button class="collapse-toggle" id="residents-toggle">
      <span class="collapse-icon">▶</span> Residents
    </button>
    <div id="residents-panel" style="display:none;margin-top:0.75rem"></div>
  </div>

  <!-- Profile edit -->
  <div id="profile-edit-section"></div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script src="js/parking.js"></script>
<script>
const currentUser = requireAuth('renter');
if (!currentUser) throw new Error('not authed');

if (currentUser.role === 'admin' || currentUser.role === 'master') {
  document.getElementById('admin-link').style.display = 'inline';
}
document.getElementById('logout-link').addEventListener('click', e => { e.preventDefault(); logout(); });

// ── Init & real-time refresh ──────────────────────────────────────────────────
let _spots = [], _users = [], _payments = [];

async function loadAll() {
  [_spots, _users, _payments] = await Promise.all([
    readFile('data/spots.json'),
    readFile('data/users.json'),
    readFile('data/payments.json')
  ]);
}

async function refresh() {
  await loadAll();
  buildSVG(_spots, _users, currentUser);
  highlightMySpots();
  renderMyPayments();
  renderProfile();
  if (document.getElementById('residents-panel').style.display !== 'none') {
    renderResidents();
  }
}

// Poll every 30 s + refresh on tab focus
refresh();
setInterval(refresh, 30000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });

function highlightMySpots() {
  const me = _users.find(u => u.id === currentUser.id);
  if (!me || !me.assignedSpots) return;
  me.assignedSpots.forEach(sid => {
    const g = document.querySelector(`[data-id="${sid}"]`);
    if (g) g.classList.add('highlighted');
  });
}

// ── My Payments ───────────────────────────────────────────────────────────────
let _paymentYear = new Date().getFullYear();

function renderMyPayments() {
  const section = document.getElementById('my-payments-section');
  section.innerHTML = '';

  const me = _users.find(u => u.id === currentUser.id);
  if (!me || !me.assignedSpots || me.assignedSpots.length === 0) return;

  const card = document.createElement('div');
  card.className = 'card';

  const header = document.createElement('div');
  header.className = 'card-header';
  const h2 = document.createElement('h2'); h2.textContent = 'My Payments';
  header.appendChild(h2);

  // Year selector
  const yw = document.createElement('div');
  yw.style.cssText = 'display:flex;align-items:center;gap:0.5rem;font-size:0.85rem';
  const ylbl = document.createElement('label');
  ylbl.style.cssText = 'font-weight:600;color:var(--gray-600);font-size:0.75rem;text-transform:uppercase;letter-spacing:.04em';
  ylbl.textContent = 'Year';
  const ysel = document.createElement('select');
  ysel.style.width = 'auto';
  const thisYear = new Date().getFullYear();
  for (let y = thisYear; y >= thisYear - 4; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === _paymentYear) opt.selected = true;
    ysel.appendChild(opt);
  }
  ysel.addEventListener('change', () => { _paymentYear = parseInt(ysel.value); renderMyPayments(); });
  yw.appendChild(ylbl); yw.appendChild(ysel);
  header.appendChild(yw);
  card.appendChild(header);

  // Termination notice
  if (me.terminationDate) {
    const notice = document.createElement('div');
    notice.className = 'alert warn';
    notice.style.marginBottom = '0.75rem';
    notice.textContent = `⏹ Your contract termination is set for ${me.terminationDate}. The 2-month notice period applies.`;
    card.appendChild(notice);
  }

  me.assignedSpots.forEach(sid => {
    const spot = _spots.find(s => s.id === sid);
    if (!spot) return;

    const rent = spot.monthlyRent || 80;
    const regDate = me.registeredAt ? new Date(me.registeredAt) : null;

    const spotTitle = document.createElement('h3');
    spotTitle.textContent = `Spot ${spot.label}`;
    card.appendChild(spotTitle);

    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    const table = document.createElement('table');

    const thead = document.createElement('tr');
    ['Month / Type', 'Amount Due', 'Status'].forEach(h => {
      const th = document.createElement('th'); th.textContent = h; thead.appendChild(th);
    });
    table.appendChild(thead);

    // Commission row
    const commPaid = _payments.find(p => p.spotId === sid && p.type === 'commission' && p.year === _paymentYear);
    const commTr = document.createElement('tr');
    commTr.style.background = 'var(--blue-bg)';
    const commMonthTd = document.createElement('td');
    commMonthTd.innerHTML = '<strong>Commission</strong> <span style="font-size:0.72rem;color:var(--blue)">(one-time, = 1 month rent)</span>';
    const commAmtTd = document.createElement('td'); commAmtTd.textContent = `€${rent.toFixed(2)}`;
    const commStatusTd = document.createElement('td');
    const commChip = document.createElement('span');
    commChip.className = commPaid ? 'chip paid' : 'chip unpaid';
    commChip.textContent = commPaid ? `Paid ${commPaid.paidDate}` : 'Pending';
    commStatusTd.appendChild(commChip);
    commTr.appendChild(commMonthTd); commTr.appendChild(commAmtTd); commTr.appendChild(commStatusTd);
    table.appendChild(commTr);

    // Monthly rent rows for selected year
    const months = getPaymentMonthsForYear(regDate, _paymentYear, me.terminationDate);

    months.forEach(({ month, year, label: mLabel, isFirst, isFuture }) => {
      const paid = _payments.find(p => p.spotId === sid && p.month === month && p.year === year && p.type === 'rent');
      const fraction = isFirst && regDate ? getPaymentFraction(regDate) : { fraction: 1, label: 'Full', desc: '' };
      const amount = (rent * fraction.fraction).toFixed(2);

      const tr = document.createElement('tr');

      const tdMonth = document.createElement('td');
      tdMonth.textContent = mLabel;
      if (isFirst && fraction.fraction < 1) {
        const note = document.createElement('span');
        note.className = 'pay-fraction';
        note.textContent = ` (${fraction.label})`;
        tdMonth.appendChild(note);
      }

      const tdAmt = document.createElement('td'); tdAmt.textContent = `€${amount}`;

      const tdStatus = document.createElement('td');
      if (isFuture) {
        const c = document.createElement('span'); c.className = 'chip inactive'; c.textContent = 'Future';
        tdStatus.appendChild(c);
      } else if (paid) {
        const c = document.createElement('span'); c.className = 'chip paid';
        c.textContent = `Paid ${paid.paidDate}`; tdStatus.appendChild(c);
      } else {
        const c = document.createElement('span'); c.className = 'chip unpaid'; c.textContent = 'Pending';
        tdStatus.appendChild(c);
      }

      tr.appendChild(tdMonth); tr.appendChild(tdAmt); tr.appendChild(tdStatus);
      table.appendChild(tr);
    });

    wrap.appendChild(table);
    card.appendChild(wrap);
  });

  section.appendChild(card);
}

function getPaymentMonthsForYear(regDate, year, terminationDate) {
  const now = new Date();
  const termDate = terminationDate ? new Date(terminationDate) : null;
  const months = [];

  for (let m = 1; m <= 12; m++) {
    // Skip months before registration
    if (regDate) {
      const rYear = regDate.getFullYear(), rMonth = regDate.getMonth() + 1;
      if (year < rYear || (year === rYear && m < rMonth)) continue;
    }
    // Skip months after termination
    if (termDate) {
      const tYear = termDate.getFullYear(), tMonth = termDate.getMonth() + 1;
      if (year > tYear || (year === tYear && m > tMonth)) continue;
    }
    const d = new Date(year, m - 1, 1);
    const isFuture = year > now.getFullYear() || (year === now.getFullYear() && m > now.getMonth() + 1);
    const isFirst = regDate
      ? (year === regDate.getFullYear() && m === regDate.getMonth() + 1)
      : false;
    months.push({
      month: m, year,
      label: d.toLocaleString('default', { month: 'long' }),
      isFirst, isFuture
    });
  }
  return months;
}

function getPaymentFraction(regDate) {
  const day = new Date(regDate).getDate();
  if (day <= 10) return { fraction: 1,   label: 'Full',   desc: 'Registered days 1–10: full month.' };
  if (day <= 20) return { fraction: 0.5, label: '½ month', desc: 'Registered days 11–20: half month.' };
  return             { fraction: 1/3, label: '⅓ month', desc: 'Registered days 21–30: one-third month.' };
}

// ── Residents ─────────────────────────────────────────────────────────────────
const residentsToggle = document.getElementById('residents-toggle');
residentsToggle.addEventListener('click', () => {
  const panel = document.getElementById('residents-panel');
  const open = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'block';
  residentsToggle.classList.toggle('open', !open);
  if (!open) renderResidents();
});

function renderResidents() {
  const panel = document.getElementById('residents-panel');
  panel.innerHTML = '';

  const renters = _users.filter(u => u.active && u.role === 'renter' && u.assignedSpots && u.assignedSpots.length > 0);

  if (!renters.length) {
    panel.textContent = 'No residents yet.';
    return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';
  const table = document.createElement('table');
  const head = document.createElement('tr');
  ['Spot','Name','License Plate','Car Model','Color','Phone'].forEach(h => {
    const th = document.createElement('th'); th.textContent = h; head.appendChild(th);
  });
  table.appendChild(head);

  renters.forEach(u => {
    u.assignedSpots.forEach(sid => {
      const spot = _spots.find(s => s.id === sid);
      const tr = document.createElement('tr');
      [
        spot ? `Spot ${spot.label}` : '—',
        `${u.name || ''} ${u.lastName || ''}`.trim() || '—',
        u.licensePlate || u.username || '—',
        u.carModel || '—',
        u.carColor || '—',
        u.phone || '—'
      ].forEach(text => {
        const td = document.createElement('td'); td.textContent = text; tr.appendChild(td);
      });
      table.appendChild(tr);
    });
  });
  wrap.appendChild(table);
  panel.appendChild(wrap);
}

// ── Profile edit ──────────────────────────────────────────────────────────────
function renderProfile() {
  const section = document.getElementById('profile-edit-section');
  section.innerHTML = '';
  const me = _users.find(u => u.id === currentUser.id);
  if (!me || me.role !== 'renter') return;

  const card = document.createElement('div');
  card.className = 'card';

  const header = document.createElement('div');
  header.className = 'card-header';
  const h2 = document.createElement('h2');
  h2.textContent = 'My Profile';
  header.appendChild(h2);
  card.appendChild(header);

  if (me.pendingEdits) {
    const alert = document.createElement('div');
    alert.className = 'alert info';
    alert.textContent = 'Your edit request is pending admin approval.';
    card.appendChild(alert);
    section.appendChild(card);
    return;
  }

  const form = document.createElement('form');

  function addField(label, id, value, readOnly) {
    const group = document.createElement('div');
    group.className = 'form-group';
    const lbl = document.createElement('label'); lbl.textContent = label;
    const input = document.createElement('input');
    input.id = id; input.value = value || '';
    if (readOnly) input.readOnly = true;
    group.appendChild(lbl); group.appendChild(input);
    return group;
  }

  const grid = document.createElement('div');
  grid.className = 'grid-2';
  grid.appendChild(addField('License Plate (username)', 'p-plate', me.licensePlate || me.username, true));
  grid.appendChild(addField('Phone / WhatsApp', 'p-phone', me.phone, false));
  grid.appendChild(addField('Car Model', 'p-carmodel', me.carModel, false));
  grid.appendChild(addField('Car Color', 'p-carcolor', me.carColor, false));
  form.appendChild(grid);

  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  btnRow.style.marginTop = '0.5rem';
  const submitBtn = document.createElement('button');
  submitBtn.type = 'submit';
  submitBtn.textContent = 'Submit Changes';
  const msg = document.createElement('div');
  btnRow.appendChild(submitBtn);
  btnRow.appendChild(msg);
  form.appendChild(btnRow);

  const note = document.createElement('p');
  note.style.cssText = 'font-size:0.78rem;color:var(--gray-600);margin-top:0.5rem';
  note.textContent = 'Changes require admin approval before taking effect.';
  form.appendChild(note);

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const changes = {};
    const phone    = document.getElementById('p-phone').value.trim();
    const carModel = document.getElementById('p-carmodel').value.trim();
    const carColor = document.getElementById('p-carcolor').value.trim();
    if (phone    !== (me.phone    || '')) changes.phone    = phone;
    if (carModel !== (me.carModel || '')) changes.carModel = carModel;
    if (carColor !== (me.carColor || '')) changes.carColor = carColor;
    if (!Object.keys(changes).length) {
      msg.className = 'alert warn'; msg.textContent = 'No changes detected.'; return;
    }
    try {
      await patchRow('data/users.json', me.id, {
        pendingEdits: { ...changes, requestedAt: new Date().toISOString() }
      });
      msg.className = 'alert success'; msg.textContent = 'Changes submitted — waiting for admin approval.';
      submitBtn.disabled = true;
      refresh();
    } catch(err) { msg.className = 'alert error'; msg.textContent = err.message; }
  });

  card.appendChild(form);
  section.appendChild(card);
}
</script>
</body>
</html>
