name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      STAGING_SUPABASE_URL:         ${{ secrets.STAGING_SUPABASE_URL }}
      STAGING_SUPABASE_ANON_KEY:    ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      STAGING_SUPABASE_SERVICE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}
      STAGING_WORKER_URL:           ${{ secrets.STAGING_WORKER_URL }}
      STAGING_ADMIN_PASSWORD:       ${{ secrets.STAGING_ADMIN_PASSWORD }}
      STAGING_MASTER_PASSWORD:      ${{ secrets.STAGING_MASTER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply schema to staging
        run: |
          curl -sS --fail-with-body \
            -X POST "https://api.supabase.com/v1/projects/yuoqbjopaemikxiwvtup/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(jq -Rs . < db/schema.sql)}"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed staging database
        run: |
          node tests/fixtures/staging-config.js
          node tests/fixtures/seed.js

      - name: Warm up worker and assert login works (fail fast)
        run: |
          for attempt in 1 2 3; do
            echo "Warm-up attempt $attempt..."
            RESPONSE=$(curl -sS -m 15 -X POST "$STAGING_WORKER_URL/auth/login" \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"TEST-ADMIN\",\"password\":\"$STAGING_ADMIN_PASSWORD\"}" || true)
            echo "$RESPONSE" | grep -q '"accessToken"' && { echo "Worker login OK"; exit 0; }
            echo "No accessToken yet; response was: $RESPONSE"
            sleep 3
          done
          echo "Worker login failed after 3 attempts — failing fast instead of running the full suite."
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          SKIP_SEED: "1"
          # Stop the run on the first failure (after retries) for fast feedback
          # while we stabilize the suite. Remove this line to run the full suite.
          MAX_FAILURES: "1"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
