name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      STAGING_SUPABASE_URL:         ${{ secrets.STAGING_SUPABASE_URL }}
      STAGING_SUPABASE_ANON_KEY:    ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      STAGING_SUPABASE_SERVICE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}
      STAGING_WORKER_URL:           ${{ secrets.STAGING_WORKER_URL }}
      STAGING_ADMIN_PASSWORD:       ${{ secrets.STAGING_ADMIN_PASSWORD }}
      STAGING_MASTER_PASSWORD:      ${{ secrets.STAGING_MASTER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply schema to staging
        run: |
          curl -sS --fail-with-body \
            -X POST "https://api.supabase.com/v1/projects/yuoqbjopaemikxiwvtup/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(jq -Rs . < db/schema.sql)}"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
