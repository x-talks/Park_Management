<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#818cf8"/>
<title>Park Management — Login</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<button id="theme-toggle" class="icon-btn login-theme-toggle" title="Toggle theme"><i data-lucide="sun"></i></button>
<div class="login-wrap">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:1.25rem">
      <img src="logo.png" alt="Logo" style="height:72px;width:auto;object-fit:contain" onerror="this.style.display='none'"/>
    </div>
    <h1 data-i18n="app.name">Park Management</h1>
    <p class="subtitle" data-i18n="login.subtitle">Sign in to your account</p>
    <form id="login-form">
      <div class="form-group">
        <label for="username" data-i18n="login.label.plate">License Plate / Username</label>
        <input id="username" type="text" autocomplete="username" data-i18n-ph="login.placeholder.plate" placeholder="e.g. HD-XY-123" required/>
      </div>
      <div class="form-group">
        <label for="password" data-i18n="login.label.password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required/>
      </div>
      <button type="submit" style="width:100%" data-i18n="login.btn">Sign In</button>
      <div id="error" class="alert error" style="display:none"></div>
    </form>
    <div style="margin-top:1.25rem;text-align:center">
      <div id="lang-switcher"></div>
    </div>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n/en.js"></script>
<script src="js/i18n/de.js"></script>
<script src="js/i18n/tr.js"></script>
<script src="js/i18n.js"></script>
<script type="module">
  import { createIcons, icons } from 'https://cdn.jsdelivr.net/npm/lucide@latest/dist/esm/lucide.js';
  import { initTheme, cycleTheme } from './js/theme.js';
  window.lucide = { createIcons: () => createIcons({ icons }) };
  initTheme();
  window.lucide.createIcons();
  document.getElementById('theme-toggle').addEventListener('click', cycleTheme);
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
<script>
buildSwitcher('lang-switcher');
applyPage();

if (getSession()) location.href = 'parking.html';

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = t('login.btn.loading');
  try {
    const user = await login(
      document.getElementById('username').value.trim(),
      document.getElementById('password').value
    );
    applySavedLangFromProfile(user);
    location.href = (user.role === 'admin' || user.role === 'master') ? 'admin.html' : 'parking.html';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'flex';
    btn.disabled = false; btn.textContent = t('login.btn');
  }
});
</script>
</body>
</html>
