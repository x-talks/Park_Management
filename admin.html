<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Park Management — Admin</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<header class="site-header">
  <h1>Admin Dashboard</h1>
  <nav class="site-nav">
    <a href="parking.html">Map</a>
    <a href="admin.html" class="active">Admin</a>
    <a href="#" id="logout-link">Logout</a>
  </nav>
</header>

<div class="page-wrap">

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn" id="tab-btn-users">
      Users <span id="pending-badge" class="badge" style="display:none">0</span>
    </button>
    <button class="tab-btn" id="tab-btn-spots">Spots</button>
    <button class="tab-btn" id="tab-btn-payments">Payments</button>
  </div>

  <!-- Users tab -->
  <div id="tab-users" class="tab-panel">
    <div class="card">
      <div class="card-header">
        <h2>Users</h2>
        <span id="last-refresh" style="font-size:0.75rem;color:var(--gray-600)"></span>
      </div>
      <div id="user-list"></div>
    </div>

    <div class="card">
      <div class="card-header"><h2>Create User &amp; Generate Invite</h2></div>
      <form id="create-user-form">
        <div class="grid-2">
          <div class="form-group"><label>First Name *</label><input id="cu-name" required/></div>
          <div class="form-group"><label>Last Name *</label><input id="cu-lastname" required/></div>
          <div class="form-group"><label>Phone / WhatsApp *</label><input id="cu-phone" required/></div>
          <div class="form-group"><label>Address *</label><input id="cu-address" required/></div>
        </div>
        <div class="form-group">
          <label>Parking Spot * <small style="font-weight:400;text-transform:none">(free spots only)</small></label>
          <select id="cu-spot" required><option value="">— select —</option></select>
        </div>
        <p style="font-size:0.8rem;color:var(--gray-600);margin:0 0 0.75rem">
          Car details are optional — user must complete any missing fields during registration.
        </p>
        <div class="grid-3">
          <div class="form-group"><label>License Plate</label><input id="cu-plate" placeholder="HD-XY-123"/></div>
          <div class="form-group"><label>Car Model</label><input id="cu-carmodel" placeholder="VW Golf"/></div>
          <div class="form-group"><label>Car Color</label><input id="cu-carcolor" placeholder="blue"/></div>
        </div>
        <button type="submit">Generate Invite Link</button>
        <div id="cu-msg" style="margin-top:0.5rem"></div>
      </form>
      <div id="invite-result-box" style="display:none" class="invite-link-box">
        <strong>Invite link (valid 7 days):</strong><br>
        <code id="invite-url-text" style="word-break:break-all;font-size:0.8rem"></code><br>
        <a id="invite-wa-link" class="wa-btn" target="_blank">💬 Send via WhatsApp</a>
      </div>
    </div>
  </div>

  <!-- Spots tab -->
  <div id="tab-spots" class="tab-panel" style="display:none">
    <div class="card">
      <div class="card-header"><h2>Spot Assignments</h2></div>
      <div id="spot-list"></div>
    </div>
  </div>

  <!-- Payments tab -->
  <div id="tab-payments" class="tab-panel" style="display:none">
    <div class="card">
      <div class="card-header"><h2>Payment Overview</h2></div>
      <div id="payment-matrix"></div>
    </div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script>
const currentUser = requireAuth('admin');
document.getElementById('logout-link').addEventListener('click', e => { e.preventDefault(); logout(); });

// ── Tabs ──────────────────────────────────────────────────────────────────────
let activeTab = 'users';
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).style.display = 'block';
  document.getElementById('tab-btn-' + name).classList.add('active');
  activeTab = name;
  if (name === 'users')    { renderUsers(); loadFreeSpots(); }
  if (name === 'spots')    renderSpots();
  if (name === 'payments') renderPayments();
}
['users','spots','payments'].forEach(t =>
  document.getElementById('tab-btn-' + t).addEventListener('click', () => showTab(t))
);
showTab('users');

// Real-time: refresh every 30s + on focus
setInterval(() => { if (activeTab === 'users') renderUsers(); }, 30000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    if (activeTab === 'users')    renderUsers();
    if (activeTab === 'spots')    renderSpots();
    if (activeTab === 'payments') renderPayments();
  }
});

// ── DOM helpers ───────────────────────────────────────────────────────────────
function td(text, cls) {
  const c = document.createElement('td');
  c.textContent = text ?? '—';
  if (cls) c.className = cls;
  return c;
}
function th(text) {
  const c = document.createElement('th'); c.textContent = text; return c;
}
function btn(label, cls, onClick) {
  const b = document.createElement('button');
  b.textContent = label;
  b.className = 'sm ' + (cls || '');
  b.addEventListener('click', onClick);
  return b;
}
function chip(text, cls) {
  const s = document.createElement('span');
  s.className = 'chip ' + cls;
  s.textContent = text;
  return s;
}

// ── Users tab ─────────────────────────────────────────────────────────────────
async function renderUsers() {
  const [users, spots] = await Promise.all([loadUsers(), readFile('data/spots.json')]);

  const pending = users.filter(u => u.pendingEdits);
  const badge = document.getElementById('pending-badge');
  badge.textContent = pending.length;
  badge.style.display = pending.length > 0 ? 'inline-flex' : 'none';

  document.getElementById('last-refresh').textContent =
    'Updated ' + new Date().toLocaleTimeString();

  const container = document.getElementById('user-list');
  container.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';
  const table = document.createElement('table');

  const headRow = document.createElement('tr');
  ['Plate / User','Name','Phone','Spots','Car','Password','Status','Actions'].forEach(h => headRow.appendChild(th(h)));
  table.appendChild(headRow);

  users.forEach(u => {
    const assignedSpotLabels = (u.assignedSpots || [])
      .map(sid => { const s = spots.find(x => x.id === sid); return s ? `Spot ${s.label}` : sid; })
      .join(', ') || '—';
    const isMaster = u.role === 'master';

    const row = document.createElement('tr');
    if (u.pendingEdits) row.className = 'pending-row';

    row.appendChild(td(u.licensePlate || u.username));
    row.appendChild(td((`${u.name || ''} ${u.lastName || ''}`).trim() || '—'));
    row.appendChild(td(u.phone || '—'));
    row.appendChild(td(assignedSpotLabels));
    row.appendChild(td(u.carModel ? `${u.carModel} / ${u.carColor || '?'}` : '—'));

    const pwCell = document.createElement('td');
    pwCell.className = 'pw-cell';
    pwCell.textContent = u.lastPassword || '—';
    row.appendChild(pwCell);

    // Status chip
    const statusCell = document.createElement('td');
    statusCell.appendChild(chip(u.active ? 'Active' : 'Inactive', u.active ? 'active' : 'inactive'));
    if (u.pendingEdits) statusCell.appendChild(document.createTextNode(' '));
    if (u.pendingEdits) statusCell.appendChild(chip('Edit pending', 'pending'));
    row.appendChild(statusCell);

    const ac = document.createElement('td');
    const btnRow = document.createElement('div');
    btnRow.className = 'btn-row';

    if (!isMaster) {
      btnRow.appendChild(btn(u.active ? 'Deactivate' : 'Activate', 'secondary', async () => {
        await toggleUserActive(u.id); renderUsers();
      }));

      btnRow.appendChild(btn('Edit', 'secondary', () => {
        const editRow = document.getElementById('edit-' + u.id);
        if (editRow) {
          const open = editRow.style.display !== 'none';
          editRow.style.display = open ? 'none' : 'table-row';
        }
      }));

      btnRow.appendChild(btn('Reset PW', 'secondary', async () => {
        const pw = prompt(`New password for ${u.licensePlate || u.username}:`);
        if (!pw) return;
        try { await resetPassword(u.id, pw, currentUser.role); renderUsers(); }
        catch(e) { alert(e.message); }
      }));

      btnRow.appendChild(btn('Delete', 'danger', async () => {
        if (!confirm(`Delete "${u.licensePlate || u.username}"? This cannot be undone.`)) return;
        try { await deleteUser(u.id); renderUsers(); }
        catch(e) { alert(e.message); }
      }));

      if (u.pendingEdits) {
        const { requestedAt, ...changes } = u.pendingEdits;
        const summary = Object.entries(changes).map(([k, v]) => `${k}: ${u[k] || '—'} → ${v}`).join(' · ');
        const diffSpan = document.createElement('div');
        diffSpan.style.cssText = 'font-size:0.72rem;color:var(--amber);margin-top:0.25rem;width:100%';
        diffSpan.textContent = 'Pending: ' + summary;
        btnRow.appendChild(diffSpan);

        btnRow.appendChild(btn('Approve', 'success-btn', async () => {
          await approvePendingEdit(u.id); renderUsers();
        }));
        btnRow.appendChild(btn('Reject', 'secondary', async () => {
          await rejectPendingEdit(u.id); renderUsers();
        }));
      }
    }

    ac.appendChild(btnRow);
    row.appendChild(ac);
    table.appendChild(row);

    // Inline edit row
    if (!isMaster) {
      const editRow = document.createElement('tr');
      editRow.id = 'edit-' + u.id;
      editRow.style.display = 'none';

      const editCell = document.createElement('td');
      editCell.setAttribute('colspan', '8');

      const inner = document.createElement('div');
      inner.className = 'edit-row-inner';

      const grid = document.createElement('div');
      grid.className = 'edit-grid';

      [
        ['First Name',    'name',         u.name],
        ['Last Name',     'lastName',     u.lastName],
        ['Phone',         'phone',        u.phone],
        ['Address',       'address',      u.address],
        ['License Plate', 'licensePlate', u.licensePlate || u.username],
        ['Car Model',     'carModel',     u.carModel],
        ['Car Color',     'carColor',     u.carColor],
      ].forEach(([label, key, val]) => {
        const g = document.createElement('div');
        g.className = 'form-group';
        const lbl = document.createElement('label'); lbl.textContent = label;
        const inp = document.createElement('input');
        inp.id = `ef-${u.id}-${key}`; inp.value = val || '';
        g.appendChild(lbl); g.appendChild(inp);
        grid.appendChild(g);
      });

      const msgEl = document.createElement('span');
      msgEl.style.fontSize = '0.8rem';
      const saveBtns = document.createElement('div');
      saveBtns.className = 'btn-row';
      saveBtns.style.marginTop = '0.5rem';

      saveBtns.appendChild(btn('Save', '', async () => {
        const get = key => document.getElementById(`ef-${u.id}-${key}`).value.trim();
        try {
          await updateUser(u.id, {
            name: get('name'), lastName: get('lastName'), phone: get('phone'),
            address: get('address'), licensePlate: get('licensePlate'),
            carModel: get('carModel'), carColor: get('carColor'),
          });
          renderUsers();
        } catch(e) { msgEl.textContent = e.message; msgEl.style.color = 'var(--red)'; }
      }));
      saveBtns.appendChild(btn('Cancel', 'secondary', () => { editRow.style.display = 'none'; }));
      saveBtns.appendChild(msgEl);

      inner.appendChild(grid);
      inner.appendChild(saveBtns);
      editCell.appendChild(inner);
      editRow.appendChild(editCell);
      table.appendChild(editRow);
    }
  });

  wrap.appendChild(table);
  container.appendChild(wrap);
}

// ── Free spots dropdown ───────────────────────────────────────────────────────
async function loadFreeSpots() {
  const spots = await readFile('data/spots.json');
  const sel = document.getElementById('cu-spot');
  sel.innerHTML = '<option value="">— select —</option>';
  spots.filter(s => !s.assignedUserId).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id; opt.textContent = `Spot ${s.label}`;
    sel.appendChild(opt);
  });
}

// ── Create user + invite ──────────────────────────────────────────────────────
document.getElementById('create-user-form').addEventListener('submit', async e => {
  e.preventDefault();
  const msg = document.getElementById('cu-msg');
  msg.textContent = '';
  const resultBox = document.getElementById('invite-result-box');
  resultBox.style.display = 'none';
  const submitBtn = e.target.querySelector('button[type=submit]');
  submitBtn.disabled = true; submitBtn.textContent = 'Creating…';
  try {
    const url = await createAndInviteUser({
      name:         document.getElementById('cu-name').value.trim(),
      lastName:     document.getElementById('cu-lastname').value.trim(),
      phone:        document.getElementById('cu-phone').value.trim(),
      address:      document.getElementById('cu-address').value.trim(),
      spotId:       document.getElementById('cu-spot').value,
      licensePlate: document.getElementById('cu-plate').value.trim() || null,
      carModel:     document.getElementById('cu-carmodel').value.trim() || null,
      carColor:     document.getElementById('cu-carcolor').value.trim() || null,
    });
    document.getElementById('invite-url-text').textContent = url;
    const name = document.getElementById('cu-name').value.trim();
    const waText = encodeURIComponent(
      `Hallo ${name},\n\nHier ist dein Einladungslink zur Parkplatzverwaltung:\n${url}\n\nBitte registriere dich innerhalb von 7 Tagen.`
    );
    document.getElementById('invite-wa-link').href = `https://wa.me/?text=${waText}`;
    resultBox.style.display = 'block';
    msg.className = 'alert success'; msg.textContent = 'Invite created successfully.';
    e.target.reset();
    loadFreeSpots();
    renderUsers();
  } catch(err) {
    msg.className = 'alert error'; msg.textContent = err.message;
  } finally {
    submitBtn.disabled = false; submitBtn.textContent = 'Generate Invite Link';
  }
});

// ── Spots tab ─────────────────────────────────────────────────────────────────
async function renderSpots() {
  const [spots, users] = await Promise.all([readFile('data/spots.json'), loadUsers()]);
  const container = document.getElementById('spot-list');
  container.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';
  const table = document.createElement('table');

  const headRow = document.createElement('tr');
  ['Spot','State','Assigned To','License Plate','Monthly Rent','Actions'].forEach(h => headRow.appendChild(th(h)));
  table.appendChild(headRow);

  spots.forEach(s => {
    const renter = users.find(u => u.id === s.assignedUserId);
    const row = document.createElement('tr');
    row.appendChild(td(s.label));

    const stateCell = document.createElement('td');
    stateCell.appendChild(chip(s.state === 'free' ? 'Free' : 'Occupied', s.state === 'free' ? 'free' : 'occupied'));
    row.appendChild(stateCell);

    row.appendChild(td(renter ? (`${renter.name || ''} ${renter.lastName || ''}`).trim() : '—'));
    row.appendChild(td(renter ? (renter.licensePlate || renter.username) : '—'));
    row.appendChild(td(s.monthlyRent != null ? `€${Number(s.monthlyRent).toFixed(2)}` : '€80.00'));

    const ac = document.createElement('td');
    const bRow = document.createElement('div');
    bRow.className = 'btn-row';

    if (s.assignedUserId) {
      bRow.appendChild(btn('Unassign', 'secondary', async () => {
        await unassignSpot(s.id); renderSpots();
      }));
    } else {
      // Assign to existing user
      const sel = document.createElement('select');
      sel.style.width = 'auto';
      const defaultOpt = document.createElement('option');
      defaultOpt.value = ''; defaultOpt.textContent = '— user —';
      sel.appendChild(defaultOpt);
      users.filter(u => u.active && u.role === 'renter').forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = `${u.name || ''} (${u.licensePlate || u.username})`.trim();
        sel.appendChild(opt);
      });
      bRow.appendChild(sel);
      bRow.appendChild(btn('Assign', 'secondary', async () => {
        if (!sel.value) { alert('Select a user first.'); return; }
        try { await assignSpot(s.id, sel.value); renderSpots(); }
        catch(e) { alert(e.message); }
      }));
    }

    // Set monthly rent
    const rentInput = document.createElement('input');
    rentInput.type = 'number'; rentInput.min = '0'; rentInput.step = '0.01';
    rentInput.value = s.monthlyRent != null ? s.monthlyRent : 80;
    rentInput.style.cssText = 'width:80px;display:inline-block';
    bRow.appendChild(rentInput);
    bRow.appendChild(btn('Set Rent', 'secondary', async () => {
      const val = parseFloat(rentInput.value);
      if (isNaN(val) || val < 0) { alert('Invalid rent value'); return; }
      try { await patchRow('data/spots.json', s.id, { monthlyRent: val }); renderSpots(); }
      catch(e) { alert(e.message); }
    }));

    ac.appendChild(bRow);
    row.appendChild(ac);
    table.appendChild(row);
  });

  wrap.appendChild(table);
  container.appendChild(wrap);
}

// ── Payments tab ──────────────────────────────────────────────────────────────
async function renderPayments() {
  const [payments, spots, users] = await Promise.all([
    readFile('data/payments.json'),
    readFile('data/spots.json'),
    loadUsers()
  ]);
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ month: d.getMonth() + 1, year: d.getFullYear(),
      label: d.toLocaleString('default', { month: 'short', year: 'numeric' }) });
  }

  const container = document.getElementById('payment-matrix');
  container.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';
  const table = document.createElement('table');

  const headRow = document.createElement('tr');
  headRow.appendChild(th('Spot'));
  headRow.appendChild(th('Renter'));
  months.forEach(m => headRow.appendChild(th(m.label)));
  table.appendChild(headRow);

  // Only show assigned spots
  spots.filter(s => s.assignedUserId).forEach(s => {
    const renter = users.find(u => u.id === s.assignedUserId);
    const regDate = renter && renter.registeredAt ? new Date(renter.registeredAt) : null;
    const rent = s.monthlyRent || 80;

    const row = document.createElement('tr');
    row.appendChild(td(`Spot ${s.label}`));
    row.appendChild(td(renter ? `${renter.name || ''} ${renter.lastName || ''}`.trim() : '—'));

    months.forEach(m => {
      const cell = document.createElement('td');
      const p = payments.find(x => x.spotId === s.id && x.month === m.month && x.year === m.year);

      // Determine if this is the first month for this renter
      let fraction = 1;
      let fractionLabel = '';
      if (regDate) {
        const regMonth = regDate.getMonth() + 1;
        const regYear  = regDate.getFullYear();
        if (m.month === regMonth && m.year === regYear) {
          const day = regDate.getDate();
          if (day <= 10)      { fraction = 1;   fractionLabel = ''; }
          else if (day <= 20) { fraction = 0.5; fractionLabel = ' (½)'; }
          else                { fraction = 1/3; fractionLabel = ' (⅓)'; }
        }
      }
      const amount = (rent * fraction).toFixed(2);

      if (p) {
        cell.className = 'payment-cell-paid';
        cell.textContent = `✓ ${p.paidDate}`;
      } else if (!s.assignedUserId) {
        cell.textContent = '—';
      } else {
        cell.className = 'payment-cell-unpaid';
        const amtDiv = document.createElement('div');
        amtDiv.style.cssText = 'font-size:0.72rem;color:var(--gray-600);margin-bottom:0.2rem';
        amtDiv.textContent = `€${amount}${fractionLabel}`;
        cell.appendChild(amtDiv);
        cell.appendChild(btn('Mark Paid', 'secondary', async () => {
          try {
            await markPaid(s.id, s.assignedUserId, m.month, m.year, currentUser.id);
            renderPayments();
          } catch(e) { alert(e.message); }
        }));
      }
      row.appendChild(cell);
    });
    table.appendChild(row);
  });

  wrap.appendChild(table);
  container.appendChild(wrap);
}
</script>
</body>
</html>
